<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>

        @font-face {
            font-family: '阿里巴巴普惠体 2.0 55 Regular';
            src: url('resources://alibaba_puhui.ttf');
        }
       
        * { margin: 0; padding: 0; }
        html {
            font-family: '阿里巴巴普惠体 2.0 55 Regular';
        }
        body {
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        a{color:#94bdc7;behavior:hyperlink;}
        a:hover{color:#4ecdc4}
        .big{font-size:1.2em;}
        .red{color:#969696;}
        .dot{font-size:0.8em;padding-right:3dip;font-style: normal;}
        .link{behavior: hyperlink;}
        .bold{font-weight:bold;}
        .center{
            flow:vertical;
            vertical-align: middle;
            text-align: center;
        }
        
        /* 主容器 */
        #app {size: *;}

        #title-bar-wrap {
            background:green green rgb(154, 154, 45) rgb(105, 197, 197);
        }
        #title-bar {
            width: 100%;
            color: white;
            margin-bottom:3dip;
            horizontal-align: right;
            vertical-align: middle; 
            cursor: default;
            user-select: none;
            background:url(embed://title-bg.png) repeat-x top center;
            flow:horizontal; 
            padding:5px 0px;
        }
        
        #title-bar>div:first-child {
            font-weight: bold;
            width:100%%;
            height: 32dip;
            padding-left:10dip;
            line-height: 32dip;
        }
        #title-bar>div:last-child {
            text-align:right;
            margin-right:12dip;
            width:50dip;
        }
        #soft-name{color:#8894AA}
        
        .window-btn {
            width: 10dip;
            height: 10dip;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            margin-right:2dip;
            background:none;
        }
        #min-btn {background: #4b5454;}
        #min-btn:hover {background: #4ecdc4;}
        #close-btn {background: #a18582;}
        #close-btn:hover {background: #e74c3c;}
        
        /* 右上角菜单 */
        .menu-container {
            position: absolute;
            top: 60dip;
            right: 15dip;
            z-index: 100;
            opacity: 0.5;
        }
        .menu-btn:hover{
            background:rgb(50, 50, 50);
            color:#00D48A;
        }
        .menu-btn {
            border-radius: 20%;
            line-height: 100%;
            font-size: 1.4em;
            cursor: pointer;
            margin-bottom:5px;
            behavior: clickable;
        }
        
        .setting-item{
            flow:horizontal;
            margin-bottom: 5dip;
            line-height:38dip;
            padding-left:10dip;
            border:1px solid #6d736f;
            border-radius:10px;
        }
        .setting-item:hover{
            background-color: #32363f;
        }
        .setting-item>a{display:block;size:*;}
        
        .setting-label{
            width:100dip;
            text-align: left;
        }

        .setting-select{
            width:120dip;
            height:*;
            font-size:1em;
            flow:horizontal;
            horizontal-align:left;
            cursor: pointer;
            margin-left:*;
            padding: 1dip;
            background:none;
        }

        /* 页面通用 */
        .page {
            size: *;
            flow: vertical;
            display: none;
            text-align: center;
            background-color:#1E2025;

        }
        .page.active { display: block; }
        .page-act{padding:10dip;text-align: center;height:80dip;}
        .container {
            flow: vertical;
            vertical-align: middle;
            width:80%;
            height:*;
            margin:0 auto;
            text-align: center;
        }

        /* ===== 主界面 ===== */
        h1.title {
            font-family: 'Microsoft YaHei','阿里巴巴普惠体 2.0 55 Regular';
            font-weight: bold;
            font-size:2.8em;
            margin-bottom: 8dip;
            text-align: center;
            margin-top:10dip;
            color:#00D48A;
        }
        /* @const BASE_COLOR:#22c55e;
        h1.title  b:nth-child(1) { color: tint(@BASE_COLOR,-0.5 ,-0.5); }
        h1.title  b:nth-child(2) { color: tint(@BASE_COLOR,-0.25,-0.5); }
        h1.title  b:nth-child(3) { color: tint(@BASE_COLOR, 0.0 ,-0.5); }
        h1.title  b:nth-child(4) { color: tint(@BASE_COLOR, 0.25,-0.5); }
        h1.title  b:nth-child(5) { color: tint(@BASE_COLOR, 0.5 ,-0.5); } */

        p.subtitle {
            color: #22c55e;
            margin-bottom: 30dip;
            text-align: center;
        }

        /* 卡片按钮 */
        .card-list {
            flow: vertical;
            width: *;
            border-spacing: 15dip;
        }

        .action-card {
            flow: horizontal;
            horizontal-align: center;
            text-align: center;
            width: *;
            background: #282b32;
            border: 1dip solid #333355;
            border-radius: 3%;
            padding: 10dip;
            cursor: pointer;
            behavior: clickable;
            border:1dip solid rgba(255,255,255,0.1);
        }

        .action-card:hover {
            background: #32363f;
            border-color: #aad4d2;
            /* outline:18dip glow #494949 8dip;  */
        }
        .card-icon1, .card-icon2 {
            width: 48dip;
            height: 48dip;
            border-radius: 12dip;
            padding:10dip;
        }
        .bottom-text{
            text-align: center;
            font-size: .9em;
            color:gray;
            margin-top:20dip;
        }
        .bottom-text>p{margin-bottom:5px;}
        .card-icon1{
            background:url(embed://1.png) no-repeat center center;
        }
        .card-icon2{
            background:url(embed://2.png) no-repeat center center;
        }
        .create-card .card-icon {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        }
        .join-card .card-icon {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .state-container {
            width:100%;
            margin:0 auto;
            text-align: center;
        }
        .success-icon{
            height:80dip;
            width:*;
            background:url(embed://dog.png) no-repeat center center;
        }

        .success-icon-joined{
            height:80dip;
            width:*;
            background:url(embed://dog2.png) no-repeat center center;
        }

        .card-content {
            height:*;
            text-align:left;
            padding-left:20dip;
            flow:vertical;
            vertical-align: middle;
        }
        .card-content h3 {
            font-size:1.2em;
            margin-bottom: 4dip;
        }
        .card-content p {
            color: #888;
        }

        /* ===== 创建成功界面 ===== */
        .page-title {
            margin-bottom: 8dip;
            text-align: center;
        }
        .page-subtitle {
            color: #4f91b9;
            margin-bottom: 30dip;
            text-align: center;
        }

        .code-box {
            background: #272A31;
            border: 1px solid #4b4d4c;
            border-radius: 16dip;
            padding: 20dip;
            flow: vertical;
            margin-bottom: 20dip;
        }
        .code-label {
            color: #888;
            margin-bottom: 15dip;
        }
        .room-code {
            font-weight: bold;
            color: #ff6b6b;
            letter-spacing: 8dip;
            margin-bottom: 10dip;
        }
        .copy-btn {
            flow: horizontal;
            align: center;
            background: #1ca34d;
            border: none;
            border-radius: 8dip;
            padding: 5dip 20dip;
            color: #FCFCFC;
            cursor: pointer;
            font-weight: bold;
        }
        
        .leave-btn {
            color: #e9e9e9;
            background: #ff6b6b;
            border: 1dip solid #ff6b6b;
            border-radius: 8dip;
            padding: 5dip 20dip;
            cursor: pointer;
            font-weight: bold;
        }
        .leave-btn:disabled {
            background: #888;
            border-color: #888;
            cursor: not-allowed;
        }

        /* ========== Light-box Dialog Style ========== */
        .modal-overlay {
            position: fixed;
            top: 42dip;
            left: 0;
            right: 0;
            bottom: 0;
            display:none;
            horizontal-align:center;
            vertical-align:middle;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            padding:20dip;
        }
        .modal-overlay>div:first-child{
            border-top: 1dip solid #353941;
        }
        .modal-overlay.show {
            display: block;
        }
        
        .modal {
            behavior: light-box-dialog;
            background: #282B32;
            border-radius: 8dip;
            padding: 0;
            min-width: 300dip;
            max-width: 500dip;
            box-shadow: 0 10dip 40dip rgba(0,0,0,0.3);
        }
        
        .modal-header {
            padding: 15dip 20dip;
            color: white;
            border-radius: 8dip 8dip 0 0;
            font-weight: bold;
            position:relative;
        }
        
        .modal-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.6em;
            cursor: pointer;
            padding: 0;
            width: 24dip;
            height: 24dip;
            position: absolute;
            right:10dip;
            top:10dip;
        }
        
        .modal-close:hover {
            font-size: 1.62em;
        }
        
        .modal-body {
            padding: 20dip;
            white-space: pre-wrap;
        }
        
        .modal-footer {
            padding: 10dip 20dip;
            border-top: 1dip solid #343840;
            text-align: right;
        }
        .btn {
            padding: 8dip 16dip;
            border: 1px solid #444954;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
       .btn-primary {
            background: #FE6E67;
            color: #343840;
        }
        .btn-primary:hover {
            background: #f8463d;
            color:#0d0d0d;
        }
        .btn-secondary {
            background: #282B32;
        }
        .btn-secondary:hover {
            background: #393d46;
            color:#a7a7a7;
        }
        
        #join-code-container {
            flow: vertical;
            vertical-align: center;
            padding:5dip;
        }

        #join-code{
            background: #444954;
            color:#FCFCFC;
            width:*;
            padding:10dip;
            border-radius: 5dip;
            margin-bottom: 5dip;
        }
        #join-code:hover{
            border-radius: 5dip;
            outline:2dip glow #94bdc7 2dip;
        }
        #join-code-history{
            color: #888;
            text-decoration: none;
        }
        #join-code-history:hover{
            color: #fff;
        }

        .input-group {
            flow: vertical;
            margin-bottom: 25dip;
        }
        .input-group label {
            color: #888;
            margin-bottom: 10dip;
        }
        .code-input {
            width: *;
            height: 55dip;
            background: #1a1a2e;
            border: 1dip solid #333355;
            border-radius: 12dip;
            color: #fff;
            text-align: center;
            letter-spacing: 4dip;
        }
        .code-input:focus {
            border-color: #4ecdc4;
        }

        .confirm-btn {
            width: *;
            height: 50dip;
            border: none;
            border-radius: 12dip;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15dip;
        }
        .modal-cancel {
            color: #888;
            text-align: center;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        #demo-img{
            width:18dip;
            height:18dip;
            border:1px dashed #2c2c2c;
        }
        /* ===== 连接成功界面 ===== */
        .spacer{size:*}
        /* ========== Notification Popup ========== */
        .notification {
            position: fixed;
            bottom: 20px;
            text-align: center;
            background: #aadb36;
            color: rgb(23, 24, 21);
            padding: 15px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 4000;
            width:100%;
            margin:0 10px;
        }
        
         .notification.show {
            display: block;
            assigned!: self::opacity = 0.01, self.start-animation();
            animation-step!: self::opacity < 1.0
                    ? ( self::opacity = self::opacity + 0.01, return 10) 
                    # ( self.fade = "", return cancel );

        } 

        #login-qrcode{
            width:180dip;
            height:180dip;
            padding:3dip;
            border:1px dashed #2c2c2c;
            margin-bottom:15dip;
        }

    </style>
</head>
<body>
   <div id="title-bar-wrap">
        <div id="title-bar" -gohl-drag>
            <div class="soft-name"><span.red>❤</span>GOHL<i>v1.0.0</i></div>
            <div>
                <button id="min-btn" class="window-btn" -gohl-min></button>
                <button id="close-btn" class="window-btn" -gohl-close></button>
            </div>
        </div>
   </div>
    <div id="app">
        <!-- 1. 主界面 -->
        <div class="page active" id="main">
            <div class="container">
                <h1 class="title">HTMLayout轻量级GUI</h1>
                <p class="subtitle">无cgo❤<a @href="https://github.com/forbe/gohl">github</a></p>

                <div class="card-list">
                    <div class="action-card create-card" id="demo-btn" style="behavior: clickable;">
                        <div class="card-icon1"></div>
                        <div class="card-content">
                            <h3>弹窗示例</h3>
                            <p>behavior: clickable</p>
                        </div>
                    </div>

                    <div class="action-card join-card" id="demo-btn2" style="behavior: clickable;">
                        <div class="card-icon2"></div>
                        <div class="card-content">
                            <h3>UI更新</h3>
                            <p>UpdateUI</p>
                        </div>
                    </div>
                </div>
                <div class="bottom-text">
                    <img id="demo-img" src="embed://progress.gif" alt="loading" />
                    <p id="demo-tips">当前版本 5.0.0</p>
                    <p><a id="open-disclaimer">多窗口</a></p>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Modal Overlay -->
	<div class="modal-overlay" role="modal-overlay" id="default-modal">
		<div class="modal" role="modal-dialog">
			<div class="modal-header">
				<div><i.dot.red>●</i> <span role="modal-title".big>对话框标题</span></div>
				<button class="modal-close" role="modal-close">×</button>
			</div>
			<div class="modal-body" role="modal-body">
				这是对话框内容
			</div>
			<div class="modal-footer">
				<button class="btn btn-secondary" role="modal-cancel">取消</button>
				<button class="btn btn-primary" role="modal-ok">确定</button>
			</div>
		</div>
	</div>


     <!-- Loading Overlay -->
	<div class="modal-overlay" role="modal-overlay" id="loading">
		<div class="center">
            <img src="embed://progress.gif" alt="loading" />
        </div>
	</div>

    <!-- Notification -->
	<div class="notification" id="notification">
		<span id="notification-text">通知消息</span>
	</div>

</body>
</html>
